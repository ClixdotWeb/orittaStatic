<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Oritta Industries India Pvt Ltd. Boosting Trade & Commerce. Coming Soon.">
    <meta name="author" content="Oritta Industries India Pvt Ltd">
    <meta property="og:title" content="Oritta Industries India | Coming Soon">
    <meta property="og:description" content="Boosting Trade & Commerce. Our new website is coming soon.">
    <meta property="og:url" content="https://www.orittaindia.com">
    <meta property="og:type" content="website">
    
    <title>Oritta Industries India | Coming Soon</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Satisfy&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas for interactive background particles -->
    <canvas id="particle-canvas"></canvas>

    <!-- Main Container -->
    <div class="app-container">
        
        <!-- Centered Coming Soon Content -->
        <main class="coming-soon-wrapper">
            
            <!-- SVG Logo Badge -->
            <div class="logo-container">
                <svg viewBox="0 0 120 120" class="logo-badge" id="logo-badge-svg">
                    <!-- Outer green circle -->
                    <circle cx="60" cy="60" r="55" fill="none" stroke="var(--emerald-primary)" stroke-width="3" />
                    <circle cx="60" cy="60" r="51" fill="none" stroke="var(--emerald-glow)" stroke-width="1" stroke-dasharray="2,2" />
                    
                    <!-- Curved Path for text ORITTA (Top) -->
                    <path id="top-path" d="M 22 55 A 38 38 0 0 1 98 55" fill="none" />
                    <!-- Curved Path for text Boosting Trade & Commerce (Bottom) -->
                    <path id="bottom-path" d="M 98 65 A 38 38 0 0 1 22 65" fill="none" />
                    
                    <text font-family="'Outfit', sans-serif" font-size="12" font-weight="900" fill="var(--emerald-primary)" letter-spacing="3.5">
                        <textPath href="#top-path" startOffset="50%" text-anchor="middle">ORITTA</textPath>
                    </text>
                    
                    <text font-family="'Satisfy', cursive" font-size="6.2" fill="var(--text-muted)">
                        <textPath href="#bottom-path" startOffset="50%" text-anchor="middle">Boosting Trade & Commerce</textPath>
                    </text>
                    
                    <!-- Central Icon Group -->
                    <g transform="translate(60, 61) scale(0.6)">
                        <!-- Inner cogwheel gear -->
                        <circle cx="0" cy="0" r="22" fill="none" stroke="var(--accent-orange)" stroke-width="2.5" stroke-dasharray="6,4" class="spinning-gear" />
                        <!-- Central logo leaf/house design -->
                        <path d="M -12 10 C -12 0, -2 -14, 0 -18 C 2 -14, 12 0, 12 10 C 12 16, 8 18, 0 18 C -8 18, -12 16, -12 10 Z" fill="var(--emerald-primary)" opacity="0.9" />
                        <!-- Inner highlighting leaf shape -->
                        <path d="M -7 9 C -7 2, -1 -8, 0 -11 C 1 -8, 7 2, 7 9 C 7 13, 4 14, 0 14 C -4 14, -7 13, -7 9 Z" fill="var(--emerald-light)" />
                        <!-- Small core dot -->
                        <circle cx="0" cy="3" r="2.5" fill="var(--accent-gold)" />
                    </g>
                </svg>
            </div>
            
            <!-- Brand Typography -->
            <div class="brand-title-group">
                <h1 class="brand-title">
                    O<span>r</span><span class="i-wrapper">&#305;<span class="flame-dot"></span></span><span>t</span><span>t</span><span>a</span>
                </h1>
                <p class="brand-subtitle">INDUSTRIES INDIA PVT LTD</p>
            </div>

            <div class="minimal-divider"></div>

            <div class="status-indicator">
                <span class="indicator-dot"></span>
                <span class="status-label">COMING SOON</span>
            </div>

        </main>

        <!-- Footer -->
        <footer class="minimal-footer">
            <p>&copy; 2026 Oritta Industries India Pvt Ltd. All Rights Reserved.</p>
            <p class="footer-tagline">Boosting Trade & Commerce</p>
        </footer>
        
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
